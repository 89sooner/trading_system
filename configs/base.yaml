app:
  environment: local
  timezone: Asia/Seoul
  mode: backtest
  reconciliation_interval: 300

market_data:
  provider: mock
  symbols:
    - BTCUSDT

execution:
  broker: paper

risk:
  max_position: 1.0
  max_notional: 100000.0
  max_order_size: 0.25

backtest:
  starting_cash: 1000000.0
  fee_bps: 5.0
  trade_quantity: 0.1

# Portfolio-level risk controls (optional).
# When set, the runtime enforces drawdown protection and optional SL/TP exits.
#
portfolio_risk:
  max_daily_drawdown_pct: 0.05
  sl_pct: 0.02
  tp_pct: 0.04

api:
  cors_allow_origins:
    - "*"
