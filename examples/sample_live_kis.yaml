name: kis_live_preflight_smoke
# For real order submission, use:
#   --mode live --provider kis --broker kis --live-execution live
# and set environment variable:
#   TRADING_SYSTEM_ENABLE_LIVE_ORDERS=true
# Optional:
#   TRADING_SYSTEM_LIVE_BAR_SAMPLES=2
# API mode also accepts live_execution=live under the same guard conditions.
app:
  environment: local
  timezone: Asia/Seoul
  mode: live
market_data:
  provider: kis
  symbols:
    - "005930"
execution:
  broker: kis
risk:
  max_position: 10
  max_notional: 100000000
  max_order_size: 5
backtest:
  starting_cash: 10000000
  fee_bps: 5
  trade_quantity: 1
