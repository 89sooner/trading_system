<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Strategies</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <header class="page-header">
      <h1>Strategy Profiles</h1>
      <nav>
        <a href="./index.html">Run Form</a>
        <a href="./patterns.html">Patterns</a>
        <a href="./strategies.html">Strategies</a>
        <a href="./runs.html">Runs</a>
      </nav>
    </header>

    <main class="container">
      <section class="card">
        <h2>API Endpoint</h2>
        <div class="api-row">
          <label>
            API Base URL
            <input id="api-base-url" name="apiBaseUrl" value="http://127.0.0.1:8000/api/v1" />
          </label>
          <button id="save-api-base-url" type="button">Save API URL</button>
        </div>
        <p id="api-base-message" class="message" role="status" aria-live="polite"></p>
      </section>

      <section class="card">
        <h2>Create Strategy Profile</h2>
        <form id="strategy-form" class="form-grid">
          <label>
            Strategy ID
            <input id="strategy-id" name="strategyId" value="bullish-profile" required />
          </label>
          <label>
            Name
            <input id="strategy-name" name="strategyName" value="Bullish Profile" required />
          </label>
          <label>
            Pattern Set
            <select id="strategy-pattern-set" name="patternSet" required></select>
          </label>
          <label>
            Trade Quantity
            <input id="strategy-trade-quantity" name="strategyTradeQuantity" type="number" min="0.0001" step="0.0001" value="0.2" />
          </label>
          <label class="full-span">
            Label to Side
            <textarea id="strategy-label-map" name="strategyLabelMap" rows="6">bullish_reversal=buy</textarea>
          </label>
          <label class="full-span">
            Threshold Overrides
            <textarea id="strategy-thresholds" name="strategyThresholds" rows="4">bullish_reversal=0.8</textarea>
          </label>
          <button id="save-strategy-button" type="submit">Save Strategy Profile</button>
        </form>
        <p id="strategy-message" class="message" role="status" aria-live="polite"></p>
      </section>

      <section class="card">
        <div class="row-between">
          <h2>Saved Strategies</h2>
          <button id="refresh-strategies" type="button">Refresh</button>
        </div>
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Pattern Set</th>
              <th>Trade Quantity</th>
            </tr>
          </thead>
          <tbody id="strategies-body"></tbody>
        </table>
      </section>
    </main>

    <script type="module" src="./src/pages/strategiesPage.js"></script>
  </body>
</html>
