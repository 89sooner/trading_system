<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pattern Set Detail</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <header class="page-header">
      <h1>Pattern Set Detail</h1>
      <nav>
        <a href="./index.html">Run Form</a>
        <a href="./patterns.html">Patterns</a>
        <a href="./strategies.html">Strategies</a>
        <a href="./runs.html">Runs</a>
        <a href="./dashboard.html">Dashboard</a>
      </nav>
    </header>

    <main class="container">
      <section class="card">
        <h2>API Endpoint</h2>
        <div class="api-row">
          <label>
            API Base URL
            <input id="api-base-url" name="apiBaseUrl" value="http://127.0.0.1:8000/api/v1" />
          </label>
          <button id="save-api-base-url" type="button">Save API URL</button>
        </div>
        <p id="api-base-message" class="message" role="status" aria-live="polite"></p>
      </section>

      <section class="card">
        <h2 id="pattern-title">Pattern Set</h2>
        <p id="pattern-detail-message" class="message" role="status" aria-live="polite"></p>
        <div id="pattern-summary"></div>
      </section>

      <section class="card">
        <h3>Patterns</h3>
        <table>
          <thead>
            <tr>
              <th>Label</th>
              <th>Lookback</th>
              <th>Sample Size</th>
              <th>Threshold</th>
            </tr>
          </thead>
          <tbody id="pattern-detail-body"></tbody>
        </table>
      </section>
    </main>

    <script type="module" src="./src/pages/patternDetailPage.js"></script>
  </body>
</html>
